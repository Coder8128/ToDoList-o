<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
</head>

<body>
    <h1>Things to Do: </h1>
    <div id="container">
        <div class="left">
            <h1>Side Tab</h1>
            <div class="tododTitle">

            </div>
        </div>
        <div class="right">
            <h1>Expanded ToDo</h1>
            <div class="todoFull">

            </div>
        </div>

        <div class="create">
            <form id="itemForm">
                <label for="title">Title:</label><br>
                <input id="title" type="text" placeholder="text..." value="Cook food"><br>

                <label for="text">description:</label><br>
                <input id="text" type="text" placeholder="text..." value="Cook 150g Chicken, 100g Rice"><br>

                <label for="priority">prio:</label><br>
                <input id="priority" type="text" placeholder="text..." value="High"><br>

                <button type="submit">Create Item</button>
            </form>
        </div>
    </div>
    <script src="bundle.js"></script>
</body>

</html>
